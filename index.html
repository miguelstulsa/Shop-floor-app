<!DOCTYPE html>
<html>
<head>
<title>Hill Manufacturing Shop Floor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#0f2338;
color:white;
text-align:center;
}

header{
background:#1a3a5c;
padding:20px;
font-size:28px;
font-weight:bold;
}

.machine{
background:#7c4a1e;
margin:10px;
padding:20px;
border-radius:8px;
cursor:pointer;
}

.machine:hover{
background:#8d5522;
}

.alert{
margin:10px;
padding:10px;
background:#ef4444;
border-radius:6px;
}

#alerts{
margin-top:30px;
}
</style>
</head>

<body>

<header>
Hill Manufacturing<br>
Shop Floor Alerts
</header>

<h2>Select Machine</h2>

<div class="machine" onclick="report('1050-B')">1050-B</div>
<div class="machine" onclick="report('7000')">7000</div>
<div class="machine" onclick="report('VF-6')">VF-6</div>
<div class="machine" onclick="report('5100-A')">5100-A</div>
<div class="machine" onclick="report('403-B')">403-B</div>

<div id="alerts">
<h2>Active Alerts</h2>
</div>

<script>

function report(machine){

let problem = prompt("What is the issue with " + machine + "?");

if(problem){

let alert = document.createElement("div");
alert.className = "alert";

alert.innerHTML =
"<b>" + machine + "</b><br>" +
problem;

document.getElementById("alerts").appendChild(alert);

}

}

</script>

</body>
</html>
