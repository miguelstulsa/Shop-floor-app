<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill Mfg — Live Feed Recovery</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a1628; color: #f0f4f8; font-family: 'Barlow', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 4px; color: #f59e0b; }
  .header p { font-size: 13px; color: #64748b; margin-top: 6px; letter-spacing: 1px; }
  .card { background: linear-gradient(175deg, #0f2236, #152c45); border: 1px solid #2a5a8c; border-radius: 16px; padding: 28px; width: 100%; max-width: 600px; margin-bottom: 16px; }
  .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: #7dd3fc; margin-bottom: 14px; }
  .status-box { background: #060d1a; border: 1px solid #1e3a5f; border-radius: 10px; padding: 14px 16px; font-size: 12px; color: #64748b; min-height: 60px; margin-bottom: 16px; line-height: 1.8; font-family: monospace; white-space: pre-wrap; }
  .status-box.ok { border-color: rgba(34,197,94,0.4); color: #4ade80; }
  .status-box.error { border-color: rgba(239,68,68,0.4); color: #f87171; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; cursor: pointer; transition: opacity 0.2s; margin-bottom: 10px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-scan { background: linear-gradient(135deg, #1e4a8c, #2563eb); color: #fff; }
  .btn-restore { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f2338; }
  .btn-restore:disabled { background: #334155; }
  .job-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; max-height: 380px; overflow-y: auto; }
  .job-row { background: rgba(255,255,255,0.04); border: 1px solid rgba(42,90,140,0.5); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
  .job-row.selected { border-color: rgba(245,158,11,0.5); background: rgba(245,158,11,0.06); }
  .job-row.already { opacity: 0.5; border-color: rgba(34,197,94,0.3); }
  .job-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .job-info { flex: 1; min-width: 0; }
  .job-machine { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #f5d050; letter-spacing: 1px; }
  .job-meta { font-size: 11px; color: #64748b; margin-top: 1px; }
  .job-type { font-size: 10px; font-weight: 700; letter-spacing: 1px; }
  .cb { width: 18px; height: 18px; accent-color: #f59e0b; cursor: pointer; flex-shrink: 0; }
  .sel-all { font-size: 12px; color: #f59e0b; cursor: pointer; text-decoration: underline; margin-bottom: 8px; display: inline-block; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: 1px; }
  .badge-blue { background: rgba(59,130,246,0.2); color: #60a5fa; }
  .badge-yellow { background: rgba(234,179,8,0.2); color: #fbbf24; }
  .badge-green { background: rgba(34,197,94,0.2); color: #4ade80; }
  .badge-red { background: rgba(239,68,68,0.2); color: #f87171; }
  .badge-already { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .warning { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 12px 16px; font-size: 12px; color: #f87171; line-height: 1.6; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ LIVE FEED RECOVERY</h1>
  <p>HILL MANUFACTURING — RESTORE MISSING JOBS TO SHOP FLOOR</p>
</div>

<div class="card">
  <div class="card-title">STEP 1 — SCAN FOR MISSING JOBS</div>
  <div id="statusBox" class="status-box">Ready. Click SCAN to find all active jobs in hillRequests that are missing from the live notes collection.</div>
  <button class="btn btn-scan" id="scanBtn" onclick="runScan()">🔍 SCAN FIREBASE</button>
</div>

<div class="card" id="resultsCard" style="display:none;">
  <div class="card-title">STEP 2 — SELECT JOBS TO RESTORE</div>
  <div id="warningBox" class="warning" style="display:none;"></div>
  <span class="sel-all" onclick="selectAll()">Select All</span>
  <div class="job-list" id="jobList"></div>
  <button class="btn btn-restore" id="restoreBtn" onclick="runRestore()" disabled>↩ RESTORE SELECTED TO LIVE FLOOR</button>
  <div id="restoreStatus" class="status-box" style="display:none;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, where, orderBy, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8lZqvva1twE8MBD38bFmk8zw1QQ5smpI",
  authDomain: "hill-manufacturing.firebaseapp.com",
  projectId: "hill-manufacturing",
  storageBucket: "hill-manufacturing.firebasestorage.app",
  messagingSenderId: "667620323956",
  appId: "1:667620323956:web:5e30e7ff6db5287b16d721"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const typeColors = { blue:'#3b82f6', yellow:'#eab308', green:'#22c55e', red:'#ef4444' };
const typeLabels = { blue:'Pending WO', yellow:'Machinist Req', green:'Running WO', red:'Inspection' };

let scanResults = [];   // { hrId, data, alreadyInNotes }

function log(msg, cls) {
  var box = document.getElementById('statusBox');
  box.textContent = msg;
  box.className = 'status-box' + (cls ? ' ' + cls : '');
}

window.runScan = async function() {
  var btn = document.getElementById('scanBtn');
  btn.disabled = true;
  btn.textContent = 'SCANNING…';
  log('Connecting to Firebase…');
  scanResults = [];

  try {
    // 1. Get all unresolved hillRequests (non-inspection)
    log('Loading unresolved hillRequests…');
    const hrSnap = await getDocs(query(
      collection(db, 'hillRequests'),
      where('resolved', '==', false),
      orderBy('createdAt', 'desc'),
      limit(200)
    ));
    const hrRecords = [];
    hrSnap.forEach(d => hrRecords.push({ id: d.id, data: d.data() }));
    log(`Found ${hrRecords.length} unresolved hillRequests records.`);

    // 2. Get all current notes
    log('Loading current notes collection…');
    const notesSnap = await getDocs(collection(db, 'notes'));
    const existingHrIds = new Set();
    const existingMachineWo = new Set();  // fallback match
    notesSnap.forEach(d => {
      const nd = d.data();
      if (nd.hillReqId) existingHrIds.add(nd.hillReqId);
      if (nd.machine && nd.wo) existingMachineWo.add(nd.machine + '|' + nd.wo + '|' + nd.type);
    });
    log(`Current notes collection has ${notesSnap.size} document(s).`);

    // 3. Compare — find which hillRequests have no matching note
    let missing = 0, present = 0;
    hrRecords.forEach(({ id, data }) => {
      const inNotes = existingHrIds.has(id)
        || (data.machine && data.wo && existingMachineWo.has(data.machine + '|' + data.wo + '|' + data.type));
      scanResults.push({ hrId: id, data, alreadyInNotes: inNotes });
      if (inNotes) present++; else missing++;
    });

    log(`Scan complete:\n  ${missing} job(s) MISSING from live floor\n  ${present} job(s) already present in notes\n\nReview and select which to restore below.`, missing > 0 ? '' : 'ok');

    renderResults();
    document.getElementById('resultsCard').style.display = 'block';

    if (missing === 0 && hrRecords.length > 0) {
      document.getElementById('warningBox').style.display = 'none';
    } else if (missing > 0) {
      var wb = document.getElementById('warningBox');
      wb.style.display = 'block';
      wb.textContent = `⚠ ${missing} job(s) are in hillRequests but missing from the live notes collection — they won't show on the shop floor until restored.`;
    }

  } catch(e) {
    log('Error: ' + e.message + '\n\nMake sure you are online and Firebase is reachable.', 'error');
  }

  btn.disabled = false;
  btn.textContent = '🔍 SCAN AGAIN';
};

function renderResults() {
  var list = document.getElementById('jobList');
  list.innerHTML = '';

  if (scanResults.length === 0) {
    list.innerHTML = '<div style="color:#475569;font-size:13px;text-align:center;padding:20px;">No unresolved jobs found in hillRequests.</div>';
    return;
  }

  // Sort: missing first
  var sorted = scanResults.slice().sort((a, b) => {
    if (!a.alreadyInNotes && b.alreadyInNotes) return -1;
    if (a.alreadyInNotes && !b.alreadyInNotes) return 1;
    return 0;
  });

  sorted.forEach(({ hrId, data, alreadyInNotes }) => {
    var color = typeColors[data.type] || '#64748b';
    var label = typeLabels[data.type] || data.type || '?';
    var ts = data.createdAt && data.createdAt.seconds
      ? new Date(data.createdAt.seconds * 1000).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
      : '';

    var row = document.createElement('div');
    row.className = 'job-row' + (alreadyInNotes ? ' already' : ' selected');
    row.dataset.hrid = hrId;

    row.innerHTML = `
      <input type="checkbox" class="cb" data-hrid="${hrId}" ${alreadyInNotes ? '' : 'checked'} ${alreadyInNotes ? 'title="Already on live floor"' : ''}>
      <div class="job-dot" style="background:${color};box-shadow:0 0 6px ${color};"></div>
      <div class="job-info">
        <div class="job-machine">${data.machine || '?'}</div>
        <div class="job-meta">
          ${data.cell ? data.cell + ' · ' : ''}
          ${data.wo ? 'WO ' + data.wo : ''}
          ${data.op ? ' · Op ' + data.op : ''}
          ${data.operator ? ' · ' + data.operator : ''}
          ${ts ? ' · ' + ts : ''}
        </div>
        ${data.detail ? `<div style="font-size:11px;color:#475569;margin-top:2px;">${data.detail}</div>` : ''}
      </div>
      <div>
        <span class="badge badge-${data.type}">${label}</span>
        ${alreadyInNotes ? '<br><span class="badge badge-already" style="margin-top:4px;">ON FLOOR</span>' : ''}
      </div>`;

    var cb = row.querySelector('.cb');
    cb.addEventListener('change', updateRestoreBtn);
    list.appendChild(row);
  });

  updateRestoreBtn();
}

window.selectAll = function() {
  document.querySelectorAll('.cb').forEach(cb => {
    var row = cb.closest('.job-row');
    if (!row.classList.contains('already')) cb.checked = true;
  });
  updateRestoreBtn();
};

function updateRestoreBtn() {
  var checked = document.querySelectorAll('.cb:checked').length;
  var btn = document.getElementById('restoreBtn');
  btn.disabled = checked === 0;
  btn.textContent = checked > 0
    ? `↩ RESTORE ${checked} JOB${checked===1?'':'S'} TO LIVE FLOOR`
    : '↩ RESTORE SELECTED TO LIVE FLOOR';
}

window.runRestore = async function() {
  var btn = document.getElementById('restoreBtn');
  btn.disabled = true;

  var selected = [];
  document.querySelectorAll('.cb:checked').forEach(cb => {
    var hrId = cb.dataset.hrid;
    var match = scanResults.find(r => r.hrId === hrId);
    if (match) selected.push(match);
  });

  if (selected.length === 0) return;

  var statusEl = document.getElementById('restoreStatus');
  statusEl.style.display = 'block';
  statusEl.className = 'status-box';
  statusEl.textContent = `Restoring ${selected.length} job(s)…`;

  var succeeded = 0, failed = 0;

  for (var i = 0; i < selected.length; i++) {
    var { hrId, data } = selected[i];
    statusEl.textContent = `Restoring ${i+1} of ${selected.length}: ${data.machine || hrId}…`;
    try {
      // Build a clean note object — strip server-generated fields
      var noteData = Object.assign({}, data);
      delete noteData.id;
      // Keep job state but reset inProgress so it's not stuck mid-run
      noteData.inProgress  = data.inProgress  || false;
      noteData.onHold      = data.onHold      || false;
      noteData.resolved    = false;
      noteData.hillReqId   = hrId;
      noteData.restoredAt  = serverTimestamp();
      noteData.createdAt   = data.createdAt || serverTimestamp();

      await addDoc(collection(db, 'notes'), noteData);
      succeeded++;
    } catch(e) {
      console.error('Restore failed for', hrId, e);
      failed++;
    }
  }

  var msg = `✅ Done!\n\n${succeeded} job(s) restored to the live floor.`;
  if (failed > 0) msg += `\n⚠ ${failed} failed — check browser console for details.`;
  msg += '\n\nRefresh your Hill Manufacturing app — all jobs should now appear on the shop floor.';

  statusEl.textContent = msg;
  statusEl.className = 'status-box ok';

  // Re-scan to update the UI
  setTimeout(runScan, 1500);
};
</script>
</body>
</html>
