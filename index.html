<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill Manufacturing Command Center</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0f2338;
color:#f0f4f8;
}

header{
background:#111827;
border-bottom:3px solid #f59e0b;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

button{
cursor:pointer;
}

.admin-btn{
background:#f59e0b;
border:none;
padding:8px 14px;
border-radius:6px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
padding:20px;
}

.cell{
background:#132c47;
border:1px solid #2a5a8c;
border-radius:10px;
padding:12px;
}

.cell-title{
font-size:16px;
font-weight:bold;
color:#f59e0b;
margin-bottom:10px;
}

.machine{
background:#1c3d5f;
border-radius:6px;
padding:10px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
border-left:6px solid #3b82f6;
}

.machine.has-green{border-left-color:#22c55e}
.machine.has-red{border-left-color:#ef4444}
.machine.has-yellow{border-left-color:#eab308}
.machine.has-blue{border-left-color:#3b82f6}

.machine:hover{
background:#254870;
}

.sidebar{
position:fixed;
right:0;
top:60px;
width:260px;
bottom:0;
background:#081424;
border-left:2px solid #2a5a8c;
padding:14px;
overflow:auto;
}

.notif{
background:#132c47;
border-radius:6px;
padding:10px;
margin-bottom:8px;
border-left:4px solid #ef4444;
}

.notif.yellow{border-left-color:#eab308}
.notif.blue{border-left-color:#3b82f6}
.notif.green{border-left-color:#22c55e}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.sidebar{
display:none;
}

}

</style>

</head>

<body>

<header>

Hill Manufacturing — Command Center

<button class="admin-btn" onclick="adminLogin()">Admin</button>

</header>

<div class="grid">

<div class="cell">
<div class="cell-title">BIG MILL</div>
<div class="machine" data-machine="1050-B">1050-B</div>
<div class="machine" data-machine="7000">7000</div>
<div class="machine" data-machine="VF-6">VF-6</div>
</div>

<div class="cell">
<div class="cell-title">5100-2500</div>
<div class="machine" data-machine="5100-B">5100-B</div>
<div class="machine" data-machine="2500">2500</div>
<div class="machine" data-machine="PUMA-3">PUMA-3</div>
</div>

<div class="cell">
<div class="cell-title">MPPI</div>
<div class="machine" data-machine="ST35">ST35</div>
<div class="machine" data-machine="VF-2">VF-2</div>
<div class="machine" data-machine="VF-3">VF-3</div>
<div class="machine" data-machine="PUMA-2">PUMA-2</div>
</div>

<div class="cell">
<div class="cell-title">403 CELL</div>
<div class="machine" data-machine="403-A">403-A</div>
<div class="machine" data-machine="403-B">403-B</div>
<div class="machine" data-machine="403-C">403-C</div>
</div>

<div class="cell">
<div class="cell-title">SAWS</div>
<div class="machine" data-machine="SAW-1">SAW-1</div>
<div class="machine" data-machine="SAW-2">SAW-2</div>
</div>

<div class="cell">
<div class="cell-title">MILL/LATHE</div>
<div class="machine" data-machine="SHARP">SHARP</div>
<div class="machine" data-machine="5100-A">5100-A</div>
<div class="machine" data-machine="SH403">SH403</div>
<div class="machine" data-machine="5000">5000</div>
</div>

<div class="cell">
<div class="cell-title">3000 CELL</div>
<div class="machine" data-machine="3000-C">3000-C</div>
</div>

<div class="cell">
<div class="cell-title">HORIZONTAL</div>
<div class="machine" data-machine="EMCO">EMCO</div>
</div>

<div class="cell">
<div class="cell-title">AUTOMATION</div>
<div class="machine" data-machine="PUMA-1">PUMA-1</div>
<div class="machine" data-machine="303-B">303-B</div>
<div class="machine" data-machine="TWIN">TWIN</div>
<div class="machine" data-machine="2500-Y">2500-Y</div>
</div>

</div>

<div class="sidebar" id="alerts">

<h3>Alerts</h3>

</div>

<script>

const ADMIN_USER="hilladmin"
const ADMIN_PASS="Hill2024!"

function adminLogin(){

let u=prompt("Username")
let p=prompt("Password")

if(u===ADMIN_USER && p===ADMIN_PASS){

alert("Admin Access Granted")

}else{

alert("Invalid Login")

}

}

/* MACHINE STATUS ENGINE */

function setMachineStatus(machine,status){

const el=document.querySelector(`[data-machine="${machine}"]`)
if(!el)return

el.classList.remove(
"has-green",
"has-red",
"has-yellow",
"has-blue"
)

switch(status){

case "running":
el.classList.add("has-green")
break

case "alarm":
el.classList.add("has-red")
createAlert(machine,"Machine Alarm","red")
break

case "idle":
el.classList.add("has-yellow")
break

case "pending":
el.classList.add("has-blue")
break

}

}

/* ALERT SYSTEM */

function createAlert(machine,msg,type){

const box=document.createElement("div")

box.className="notif "+type

box.innerHTML="<strong>"+machine+"</strong><br>"+msg

document.getElementById("alerts").prepend(box)

}

/* TEST DATA */

setMachineStatus("1050-B","running")
setMachineStatus("7000","running")
setMachineStatus("VF-6","alarm")

setMachineStatus("5100-B","running")
setMachineStatus("2500","idle")
setMachineStatus("PUMA-3","running")

setMachineStatus("ST35","idle")
setMachineStatus("VF-2","running")
setMachineStatus("VF-3","running")
setMachineStatus("PUMA-2","alarm")

</script>

</body>
</html>
