<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CNC Shop Command Center</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#111827;
padding:15px;
font-size:22px;
border-bottom:2px solid orange;
}

nav{
display:flex;
gap:10px;
padding:10px;
background:#1f2937;
flex-wrap:wrap;
}

nav button{
padding:8px 12px;
background:#374151;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

.panel{
display:none;
padding:20px;
}

.panel.active{
display:block;
}

.card{
background:#1f2937;
padding:15px;
margin-bottom:10px;
border-radius:8px;
}

input,textarea,select{
width:100%;
padding:6px;
margin-bottom:6px;
border:none;
border-radius:4px;
}

button.action{
background:orange;
color:black;
border:none;
padding:6px 10px;
cursor:pointer;
border-radius:4px;
}

.machine{
display:inline-block;
width:160px;
padding:10px;
margin:5px;
border-radius:6px;
text-align:center;
font-weight:bold;
}

.green{background:#16a34a}
.yellow{background:#eab308;color:black}
.red{background:#dc2626}
.blue{background:#2563eb}

#chatBox{
height:250px;
overflow-y:auto;
background:#020617;
padding:10px;
}

</style>

</head>
<body>

<header>CNC SHOP COMMAND CENTER</header>

<!-- LOGIN -->

<div id="loginPanel">

<div class="card">

<h2>Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button class="action" onclick="login()">Login</button>

<p>Admin Login</p>
<p>hilladmin / Hill2024!</p>

</div>

</div>

<!-- APP -->

<div id="app" style="display:none">

<nav>

<button onclick="showPanel('dashboard')">Dashboard</button>
<button onclick="showPanel('requests')">Requests</button>
<button onclick="showPanel('tools')">Tools</button>
<button onclick="showPanel('maintenance')">Maintenance</button>
<button onclick="showPanel('chat')">Chat</button>
<button onclick="showPanel('admin')" id="adminTab">Admin</button>

</nav>

<!-- DASHBOARD -->

<div id="dashboard" class="panel active">

<div class="card">

<h2>Machine Dashboard</h2>

<div id="machineBoard"></div>

</div>

</div>

<!-- REQUESTS -->

<div id="requests" class="panel">

<div class="card">

<h2>Create Request</h2>

<select id="reqMachine">
<option>CNC1</option>
<option>CNC2</option>
<option>CNC3</option>
<option>CNC4</option>
</select>

<select id="reqType">
<option>Inspection</option>
<option>Machinist</option>
<option>Tool Change</option>
</select>

<button class="action" onclick="addRequest()">Submit</button>

</div>

<div id="requestList"></div>

</div>

<!-- TOOLS -->

<div id="tools" class="panel">

<div class="card">

<h2>Tool Life Tracker</h2>

<input id="toolName" placeholder="Tool Name">
<input id="toolLife" placeholder="Max Life">
<input id="toolCurrent" placeholder="Current Count">

<button class="action" onclick="addTool()">Add Tool</button>

</div>

<div id="toolList"></div>

</div>

<!-- MAINTENANCE -->

<div id="maintenance" class="panel">

<div class="card">

<h2>Maintenance Ticket</h2>

<input id="maintMachine" placeholder="Machine">
<textarea id="maintIssue"></textarea>

<button class="action" onclick="addTicket()">Submit Ticket</button>

</div>

<div id="ticketList"></div>

</div>

<!-- CHAT -->

<div id="chat" class="panel">

<div class="card">

<h2>Shop Chat</h2>

<div id="chatBox"></div>

<input id="chatInput">

<button class="action" onclick="sendMessage()">Send</button>

</div>

</div>

<!-- ADMIN -->

<div id="admin" class="panel">

<div class="card">

<h2>User Management</h2>

<input id="newUser" placeholder="Username">
<input id="newPass" placeholder="Password">

<select id="role">
<option>operator</option>
<option>manager</option>
</select>

<button class="action" onclick="createUser()">Create User</button>

</div>

<div id="userList"></div>

</div>

</div>

<script>

let currentUser=null

let users=JSON.parse(localStorage.getItem("users"))||[
{username:"hilladmin",password:"Hill2024!",role:"admin"}
]

let requests=JSON.parse(localStorage.getItem("requests"))||[]
let tools=JSON.parse(localStorage.getItem("tools"))||[]
let tickets=JSON.parse(localStorage.getItem("tickets"))||[]
let chat=JSON.parse(localStorage.getItem("chat"))||[]

function save(){

localStorage.setItem("users",JSON.stringify(users))
localStorage.setItem("requests",JSON.stringify(requests))
localStorage.setItem("tools",JSON.stringify(tools))
localStorage.setItem("tickets",JSON.stringify(tickets))
localStorage.setItem("chat",JSON.stringify(chat))

}

function login(){

let user=users.find(u=>
u.username===username.value && u.password===password.value)

if(!user){
alert("Invalid login")
return
}

currentUser=user

loginPanel.style.display="none"
app.style.display="block"

if(user.role!=="admin")
adminTab.style.display="none"

renderAll()

}

function showPanel(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

function renderAll(){

renderMachines()
renderRequests()
renderTools()
renderTickets()
renderChat()
renderUsers()

}

function renderMachines(){

let machines=["CNC1","CNC2","CNC3","CNC4"]

let html=""

machines.forEach(m=>{

html+=`<div class="machine green">${m}<br>RUNNING</div>`

})

machineBoard.innerHTML=html

}

function addRequest(){

requests.push({
machine:reqMachine.value,
type:reqType.value
})

save()
renderRequests()

}

function renderRequests(){

let html=""

requests.forEach((r,i)=>{

html+=`
<div class="card">
${r.machine} - ${r.type}
<button onclick="requests.splice(${i},1);save();renderRequests()">Complete</button>
</div>
`

})

requestList.innerHTML=html

}

function addTool(){

tools.push({
name:toolName.value,
life:parseInt(toolLife.value),
current:parseInt(toolCurrent.value)
})

save()
renderTools()

}

function renderTools(){

let html=""

tools.forEach(t=>{

let warn=(t.current/t.life>0.9)?"⚠ Replace Soon":""

html+=`
<div class="card">
<b>${t.name}</b><br>
${t.current}/${t.life}<br>
${warn}
</div>
`

})

toolList.innerHTML=html

}

function addTicket(){

tickets.push({
machine:maintMachine.value,
issue:maintIssue.value
})

save()
renderTickets()

}

function renderTickets(){

let html=""

tickets.forEach(t=>{

html+=`
<div class="card">
<b>${t.machine}</b><br>
${t.issue}
</div>
`

})

ticketList.innerHTML=html

}

function sendMessage(){

chat.push({
user:currentUser.username,
text:chatInput.value,
time:new Date().toLocaleTimeString()
})

chatInput.value=""

save()
renderChat()

}

function renderChat(){

let html=""

chat.forEach(m=>{

html+=`
<div>
<b>${m.user}</b> ${m.time}<br>
${m.text}
<hr>
</div>
`

})

chatBox.innerHTML=html

}

function createUser(){

if(currentUser.role!=="admin") return

users.push({
username:newUser.value,
password:newPass.value,
role:role.value
})

save()
renderUsers()

}

function renderUsers(){

let html=""

users.forEach(u=>{

html+=`
<div class="card">
${u.username} - ${u.role}
</div>
`

})

userList.innerHTML=html

}

</script>

</body>
</html>
