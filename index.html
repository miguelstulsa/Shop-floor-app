<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hill Manufacturing — Shop Floor</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  
  <!-- PWA basics -->
  <meta name="theme-color" content="#0f2338"/>
  <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIkhpbGwgU2hvcCBGbG9vciIsCiAgInNob3J0X25hbWUiOiAiU2hvcEZsb29yIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwZjIzMzgiLAogICJ0aGVtZV9jb2xvciI6ICIjZjU5ZTBiiIsCiAgImljb25zIjogW3sKICAgICJzcmMiOiAiZGF0YTppbWFnZS9wbmc7YmFzZTY0LDAwMDAwMDAwIiwKICAgICJzaXplcyI6ICIxOTJ4MTkyIiwKICAgICJ0eXBlIjogImltYWdlL3BuZyIKICB9XQp9"/>
  
  <style>
    :root {
      --blue: #3b82f6; --red: #ef4444; --yellow: #eab308; --green: #22c55e;
      --bg: #0f2338; --cell: #1e4976; --machine: #7c4a1e; --accent: #f59e0b;
      --shop: #1a3a5c; --border: #2a5a8c; --text: #f0f4f8;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Barlow', sans-serif; min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #0f2338, #1a3a5c);
      border-bottom: 3px solid var(--accent);
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .shop-select select {
      background: #1e4976; color: #f0f4f8;
      border: 1px solid #2a5a8c; border-radius: 8px;
      padding: 6px 12px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    main { display: grid; grid-template-columns: 1fr 320px; min-height: calc(100vh - 65px); }
    .fsection { padding: 16px; overflow-y: auto; }
    .ftitle { font-size: 11px; letter-spacing: 3px; color: #64748b; text-transform: uppercase; margin-bottom: 12px; }
    .fgrid {
      background: #1a3a5c; border-radius: 14px; padding: 14px;
      border: 1px solid #2a5a8c; display: grid;
      grid-template-columns: repeat(4,1fr); gap: 8px;
    }
    .cell { background: #1e4976; border-radius: 8px; padding: 8px; border: 1px solid #2a5a8c; }
    .ctitle {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: #e2e8f0; margin-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px;
    }
    .machines { display: flex; flex-direction: column; gap: 4px; }
    .machine {
      background: #8B4513; border-radius: 5px; padding: 6px 8px;
      cursor: pointer; border: 1px solid #a0522d; transition: all 0.15s;
    }
    .machine:hover { background: #a0522d; border-color: #f59e0b; }
    .mname { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: #fcd34d; text-transform: uppercase; }
    .mdots { display: flex; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
    .dot {
      width: 9px; height: 9px; border-radius: 2px; display: inline-block;
      position: relative;
    }
    .dot.blue    { background: var(--blue);    }
    .dot.red     { background: var(--red);     }
    .dot.yellow  { background: var(--yellow);  }
    .dot.green   { background: var(--green);   }
    .dot::after {
      content: attr(data-time); position: absolute; bottom: 12px; left: 50%;
      transform: translateX(-50%); background: #0f2338; color: #ccc;
      font-size: 9px; padding: 2px 6px; border-radius: 4px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
      z-index: 10;
    }
    .dot:hover::after { opacity: 1; }
    .sidebar { background: #0d1f33; border-left: 1px solid #2a5a8c; display: flex; flex-direction: column; }
    .sbhead { padding: 14px 16px; border-bottom: 1px solid #2a5a8c; font-size: 12px; letter-spacing: 2px; color: #64748b; text-transform: uppercase; }
    .slist { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
    .nitem {
      background: rgba(255,255,255,0.04); border-radius: 8px; padding: 10px 12px;
      border-left: 4px solid transparent; position: relative;
    }
    .nitem.blue   { border-left-color: var(--blue);   background: rgba(59,130,246,0.08); }
    .nitem.red    { border-left-color: var(--red);    background: rgba(239,68,68,0.08); }
    .nitem.yellow { border-left-color: var(--yellow); background: rgba(234,179,8,0.08); }
    .nitem.green  { border-left-color: var(--green);  background: rgba(34,197,94,0.08); }
    .status-open    { border-left-color: #94a3b8 !important; }
    .status-progress{ border-left-color: #eab308 !important; background: rgba(234,179,8,0.12) !important; }
    .status-done    { border-left-color: #22c55e !important; background: rgba(34,197,94,0.12) !important; text-decoration: line-through; opacity: 0.85; }
    .ntype { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
    .nmachine { font-size: 12px; font-weight: 700; margin-bottom: 1px; }
    .ndetail  { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
    .ntime    { font-size: 10px; color: #475569; }
    .ndismiss { position: absolute; top: 6px; right: 8px; background: none; border: none; color: #475569; cursor: pointer; font-size: 14px; }
    .filter-bar { padding: 8px 16px; display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 12px; border-radius: 6px; border: 1px solid #2a5a8c;
      background: rgba(255,255,255,0.06); color: #f0f4f8; font-size: 11px;
      cursor: pointer;
    }
    .filter-btn.sel { background: #f59e0b; color: #0f2338; }
    .empty { text-align: center; padding: 30px 16px; color: #334155; }
    .moverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200;
      display: none; align-items: center; justify-content: center;
    }
    .moverlay.on { display: flex; }
    .modal {
      background: #0f2338; border: 1px solid #2a5a8c; border-radius: 14px;
      padding: 24px; width: 460px; max-width: 95vw; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }
    .mtitle { font-size: 22px; font-weight: 900; letter-spacing: 2px; color: #f59e0b; margin-bottom: 3px; }
    .msub  { font-size: 11px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
    .ntypes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .ntbtn {
      padding: 12px; border-radius: 8px; border: 2px solid transparent;
      cursor: pointer; text-align: left; background: rgba(255,255,255,0.04);
    }
    .ntbtn.sel { opacity: 1; }
    .ntbtn.blue    { border-color: var(--blue);    } .ntbtn.blue.sel    { background: rgba(59,130,246,0.15); }
    .ntbtn.red     { border-color: var(--red);     } .ntbtn.red.sel     { background: rgba(239,68,68,0.15); }
    .ntbtn.yellow  { border-color: var(--yellow);  } .ntbtn.yellow.sel  { background: rgba(234,179,8,0.15); }
    .ntbtn.green   { border-color: var(--green);   } .ntbtn.green.sel   { background: rgba(34,197,94,0.15); }
    .mform input, .mform select, .mform textarea {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid #2a5a8c;
      border-radius: 7px; padding: 9px 12px; color: #f0f4f8; margin-bottom: 8px;
      font-family: 'Barlow', sans-serif; font-size: 13px;
    }
    .mform select { appearance: none; }
    .mactions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .mbtn { padding: 9px 18px; border-radius: 7px; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: none; }
    .mbtn.cancel { background: rgba(255,255,255,0.06); color: #94a3b8; border: 1px solid #2a5a8c; }
    .mbtn.submit { background: #f59e0b; color: #0f2338; }
    .toasts { position: fixed; top: 80px; right: 16px; z-index: 300; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
    .toast {
      background: #0f2338; border-radius: 10px; padding: 12px 16px;
      border-left: 4px solid #f59e0b; box-shadow: 0 6px 25px rgba(0,0,0,0.5);
      min-width: 220px; animation: tin 0.3s ease, tout 0.3s ease 3.7s forwards;
    }
    .toast.red    { border-left-color: var(--red);    }
    .toast.yellow { border-left-color: var(--yellow); }
    .toast.green  { border-left-color: var(--green);  }
    .toast.blue   { border-left-color: var(--blue);   }
    @keyframes tin  { from {opacity:0; transform:translateX(30px)} to {opacity:1; transform:translateX(0)} }
    @keyframes tout { from {opacity:1} to {opacity:0} }
  </style>
</head>
<body>

<header>
  <div style="position:relative; flex:1;">
    <div class="shop-select" style="position:absolute; top:0; left:50%; transform:translateX(-50%);">
      <select id="shopSelect">
        <option value="hill">Hill Manufacturing</option>
        <option value="shop2">Shop 2</option>
        <option value="shop3">Shop 3</option>
      </select>
    </div>
  </div>
  <div class="logo">
    <svg width="42" height="42" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="21" fill="#f59e0b"/>
      <text x="21" y="28" text-anchor="middle" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="#0f2338">H</text>
    </svg>
    <div>
      <div style="font-size:22px;font-weight:900;letter-spacing:2px;color:#f59e0b">Hill Manufacturing</div>
      <div style="font-size:10px;color:#94a3b8;letter-spacing:2px;text-transform:uppercase">Shop Floor Manager</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button style="background:#f59e0b15;border:1px solid #f59e0b40;color:#f59e0b;padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;" onclick="openAdmin()">Admin</button>
    <button id="signOutBtn" style="display:none;background:#ef444415;border:1px solid #ef444440;color:#f87171;padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;" onclick="signOut()">Sign Out</button>
  </div>
</header>

<main>
  <div class="fsection">
    <div class="ftitle">Live Shop Floor - Tap any machine to add a request</div>
    <div class="fgrid">
      <!-- Your machine grid here – copy from your original file -->
      <!-- For brevity I'm leaving placeholders; paste your full .fgrid content -->
      <div class="cell"><div class="ctitle">Big Mill</div><div class="machines">
        <div class="machine" onclick="openModal('1050-B','Big Mill')"><div class="mname">1050-B</div><div class="mdots" id="n-1050-B"></div></div>
        <!-- ... add all your other machines ... -->
      </div></div>
      <!-- ... rest of cells ... -->
    </div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sbhead">Live Request Feed</div>
    <div class="filter-bar">
      <button class="filter-btn sel" data-type="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-type="blue"   onclick="setFilter('blue')">Pending</button>
      <button class="filter-btn" data-type="red"    onclick="setFilter('red')">Inspect</button>
      <button class="filter-btn" data-type="yellow" onclick="setFilter('yellow')">Machinist</button>
      <button class="filter-btn" data-type="green"  onclick="setFilter('green')">Running</button>
    </div>
    <div class="slist" id="slist"></div>
  </div>
</main>

<div class="moverlay" id="moverlay" onclick="event.target===this&&closeModal()">
  <div class="modal">
    <div class="mtitle">Add Request</div>
    <div class="msub" id="msub"></div>
    <div class="ntypes">
      <button class="ntbtn blue"    onclick="selType('blue')">   <div>🔵 Pending WO</div><div>Work order pending</div></button>
      <button class="ntbtn red"     onclick="selType('red')">    <div>🔴 Inspection</div><div>Quality check needed</div></button>
      <button class="ntbtn yellow"  onclick="selType('yellow')"> <div>🟡 Machinist Req</div><div>Tool or fixture</div></button>
      <button class="ntbtn green"   onclick="selType('green')">  <div>🟢 Running WO</div><div>Currently running</div></button>
    </div>
    <div class="mform">
      <input id="opName" readonly style="opacity:0.7"/>
      <input id="woInput" placeholder="WO# / Operation (e.g. 12345-OP10)"/>
      <select id="statusSelect">
        <option value="open">Open</option>
        <option value="inprogress">In Progress</option>
        <option value="done">Done</option>
      </select>
      <textarea id="noteText" rows="3" placeholder="Additional details..."></textarea>
    </div>
    <div class="mactions">
      <button class="mbtn cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn submit" onclick="submitNote()">Submit</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, serverTimestamp, where, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD8lZqvva1twE8MBD38bFmk8zw1QQ5smpI",
    authDomain: "hill-manufacturing.firebaseapp.com",
    projectId: "hill-manufacturing",
    storageBucket: "hill-manufacturing.firebasestorage.app",
    messagingSenderId: "667620323956",
    appId: "1:667620323956:web:5e30e7ff6db5287b16d721"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const TYPES = { blue:'Pending WO', red:'Inspection Request', yellow:'Machinist Request', green:'Running WO' };
  const ICONS = { blue:'🔵', red:'🔴', yellow:'🟡', green:'🟢' };
  const STATUS_LABEL = { open:'Open', inprogress:'In Progress', done:'Done' };

  let currentShop = localStorage.getItem('hm_shop') || 'hill';
  let currentFilter = 'all';
  let curMachine = '', curCell = '', selType = null, curUser = '';
  let notesByMachine = {};

  document.getElementById('shopSelect').value = currentShop;

  function changeShop(shop) {
    currentShop = shop;
    localStorage.setItem('hm_shop', shop);
    // Re-subscribe with shop filter
    unsubscribe?.();
    subscribeNotes();
  }

  let unsubscribe = null;
  function subscribeNotes() {
    const q = query(
      collection(db, 'notes'),
      where('shop', '==', currentShop),
      orderBy('createdAt', 'desc')
    );
    unsubscribe = onSnapshot(q, snap => {
      const notes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      notesByMachine = {};
      notes.forEach(n => {
        if (!notesByMachine[n.machine]) notesByMachine[n.machine] = [];
        notesByMachine[n.machine].push(n);
      });

      // Update dots
      document.querySelectorAll('.mdots').forEach(el => el.innerHTML = '');
      notes.forEach(n => {
        const dotsEl = document.getElementById(`n-${n.machine}`);
        if (dotsEl) {
          const dot = document.createElement('span');
          dot.className = `dot ${n.type}`;
          dot.setAttribute('data-time', n.createdAt ? new Date(n.createdAt.seconds * 1000).toLocaleString() : 'just now');
          dotsEl.appendChild(dot);
        }
      });

      updateFeed(notes);
    });
  }

  subscribeNotes();

  function updateFeed(allNotes) {
    const list = document.getElementById('slist');
    let filtered = allNotes;

    if (currentFilter !== 'all') {
      filtered = allNotes.filter(n => n.type === currentFilter);
    }

    if (!filtered.length) {
      list.innerHTML = '<div class="empty">No matching requests right now.</div>';
      return;
    }

    list.innerHTML = '';
    filtered.forEach(n => {
      const time = n.createdAt ? new Date(n.createdAt.seconds*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : 'just now';
      const status = n.status || 'open';
      const el = document.createElement('div');
      el.className = `nitem ${n.type} status-${status}`;
      el.innerHTML = `
        <div class="ntype">${ICONS[n.type]} ${TYPES[n.type]} – ${STATUS_LABEL[status]}</div>
        <div class="nmachine">${n.cell} – ${n.machine}</div>
        <div class="ndetail">${n.operator ? '<strong>'+n.operator+'</strong> – ' : ''}${n.wo}${n.detail ? ' – '+n.detail : ''}</div>
        <div class="ntime">Today at ${time}</div>
        <button class="ndismiss" onclick="deleteNote('${n.id}')">X</button>
      `;
      list.appendChild(el);
    });
  }

  window.setFilter = type => {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('sel'));
    document.querySelector(`.filter-btn[data-type="${type}"]`).classList.add('sel');
    // Re-render from current snapshot (already have data)
    subscribeNotes(); // temporary – better would be local filter, but this forces refresh
  };

  window.openModal = (machine, cell) => {
    curMachine = machine; curCell = cell; selType = null;
    document.getElementById('msub').textContent = `${cell} – ${machine}`;
    document.getElementById('woInput').value = '';
    document.getElementById('noteText').value = '';
    document.getElementById('statusSelect').value = 'open';
    document.querySelectorAll('.ntbtn').forEach(b => b.classList.remove('sel'));
    document.getElementById('moverlay').classList.add('on');
  };

  window.closeModal = () => document.getElementById('moverlay').classList.remove('on');

  window.selType = t => {
    selType = t;
    document.querySelectorAll('.ntbtn').forEach(b => b.classList.remove('sel'));
    document.querySelector(`.ntbtn.${t}`).classList.add('sel');
  };

  window.submitNote = async () => {
    if (!selType) return showToast('red', 'Select request type');
    const wo = document.getElementById('woInput').value.trim();
    if (!wo) return showToast('red', 'Enter WO / description');
    const detail = document.getElementById('noteText').value.trim();
    const status = document.getElementById('statusSelect').value;

    const note = {
      shop: currentShop,
      machine: curMachine,
      cell: curCell,
      type: selType,
      wo, detail,
      operator: curUser || 'Unknown',
      status,
      createdAt: serverTimestamp()
    };

    await addDoc(collection(db, 'notes'), note);
    closeModal();
    showToast(selType, 'Request submitted', wo);
  };

  window.deleteNote = async id => {
    if (!confirm('Delete this request?')) return;
    await deleteDoc(doc(db, 'notes', id));
    showToast('green', 'Request removed');
  };

  function showToast(type, title, body = '') {
    const c = document.getElementById('toasts');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<div style="font-weight:700">${title}</div>${body ? `<div style="font-size:11px;color:#94a3b8">${body}</div>` : ''}`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 4200);
  }

  // Placeholder for admin / login – add your original login logic here
  function signOut() { localStorage.clear(); location.reload(); }
  function openAdmin() { alert('Admin panel – add your original logic here'); }

  // Init current user name (from your original login flow)
  curUser = localStorage.getItem('hm_name') || '';
  document.getElementById('opName').value = curUser;
</script>

<script>
// Very minimal service worker registration for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register(new URL('data:text/javascript,addEventListener("fetch",e=>e.respondWith(fetch(e.request)))', import.meta.url), {scope: './'});
}
</script>
</body>
</html>
